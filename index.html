<!DOCTYPE html>
<html>
<head>
  <title>Jurnal Mengajar & LKH</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    table {
      border-collapse: collapse;
      width: auto;
      table-layout: fixed;
    }
    th, td {
      border: 1px solid black;
      text-align: center;
      padding: 2px;
    }
    /* Atur lebar kolom sesuai rasio */
    th:nth-child(1), td:nth-child(1) { width:26px; }
    th:nth-child(2), td:nth-child(2) { width:47px; }
    th:nth-child(3), td:nth-child(3) { width:111px; }
    th:nth-child(4), td:nth-child(4) { width:80px; }
    th:nth-child(5), td:nth-child(5) { width:50px; }
    th:nth-child(6), td:nth-child(6) { width:97px; }
    th:nth-child(7), td:nth-child(7) { width:44px; }
    th:nth-child(8), td:nth-child(8) { width:326px; }
    th:nth-child(9), td:nth-child(9) { width:76px; }
    th:nth-child(10), td:nth-child(10) { width:49px; }
    th:nth-child(11), td:nth-child(11) { width:32px; }
    th:nth-child(12), td:nth-child(12) { width:32px; }
    th:nth-child(13), td:nth-child(13) { width:32px; }
    th:nth-child(14), td:nth-child(14) { width:85px; }
    input, select {
      width: 100%;
      box-sizing: border-box;
    }
  </style>
</head>
<body>
<h2>JURNAL MENGAJAR DAN LAPORAN KINERJA HARIAN</h2>

<table id="jurnalTable">
  <tr>
    <th>No</th>
    <th>Hari</th>
    <th>Tanggal</th>
    <th>Jam ke-</th>
    <th>Kelas/Ekskul</th>
    <th>Mata Pelajaran</th>
    <th>No KI/KD</th>
    <th>Kegiatan/Materi</th>
    <th>Hasil</th>
    <th>Vol</th>
    <th>S</th>
    <th>I</th>
    <th>A</th>
    <th>Ket</th>
  </tr>
</table>

<button onclick="addRow()">Tambahkan baris baru</button>
<button onclick="deleteRow()">Hapus baris terakhir</button>
<button onclick="downloadExcel()">Download Excel</button>

<script>
function getHari(tanggal) {
  let hari = ["Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];
  let d = new Date(tanggal);
  return hari[d.getDay()];
}

function addRow() {
  let table = document.getElementById("jurnalTable");
  let row = table.insertRow(-1);

  // No urut otomatis
  row.insertCell(0).innerHTML = table.rows.length - 1;

  // Hari (readonly)
  row.insertCell(1).innerHTML = "<input type='text' id='hari"+(table.rows.length-1)+"' readonly>";

  // Tanggal
  row.insertCell(2).innerHTML = "<input type='date' onchange='updateHari(this)'>";

  // Jam ke-
  row.insertCell(3).innerHTML = "<input type='text'>";

  // Kelas/Ekskul
  row.insertCell(4).innerHTML = `
    <select>
      <option value='VII A'>VII A</option>
      <option value='VII B'>VII B</option>
      <option value='VIII A'>VIII A</option>
      <option value='VIII B'>VIII B</option>
      <option value='IX A'>IX A</option>
      <option value='IX B'>IX B</option>
    </select>`;

  // Mata Pelajaran
  row.insertCell(5).innerHTML = `
    <select>
      <option value='SKI'>SKI</option>
      <option value='Akidah Akhlak'>Akidah Akhlak</option>
      <option value='Fikih'>Fikih</option>
    </select>`;

  // No KI/KD
  row.insertCell(6).innerHTML = "<input type='text'>";

  // Kegiatan/Materi
  row.insertCell(7).innerHTML = "<input type='text'>";

  // Hasil (readonly)
  row.insertCell(8).innerHTML = "<input type='text' value='Terlaksana' readonly>";

  // Vol
  row.insertCell(9).innerHTML = "<input type='text'>";

  // Absensi S, I, A
  row.insertCell(10).innerHTML = "<input type='number' min='0'>";
  row.insertCell(11).innerHTML = "<input type='number' min='0'>";
  row.insertCell(12).innerHTML = "<input type='number' min='0'>";

  // Ket
  row.insertCell(13).innerHTML = "<input type='text'>";
}

function updateHari(input) {
  let rowIndex = input.parentNode.parentNode.rowIndex;
  let hariCell = document.getElementById("hari"+rowIndex);
  hariCell.value = getHari(input.value);
}

function deleteRow() {
  let table = document.getElementById("jurnalTable");
  if (table.rows.length > 1) table.deleteRow(-1);
}

function downloadExcel() {
  var wb = XLSX.utils.table_to_book(document.getElementById('jurnalTable'));
  XLSX.writeFile(wb, 'Jurnal_LKH.xlsx');
}
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Jurnal & LKH Juli 2026</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
  <!-- Tabel Jurnal -->
  <table id="jurnalTable" border="1" style="border-collapse:collapse; width:100%;">
    <tr>
      <th>No</th><th>Hari</th><th>Tanggal</th><th>Jam ke-</th>
      <th>Kelas/Ekskul</th><th>Mata Pelajaran</th><th>No KI/KD</th>
      <th>Kegiatan/Materi</th><th>Hasil</th><th>Vol</th>
      <th>S</th><th>I</th><th>A</th><th>Ket</th>
    </tr>
    <tr>
      <td>1</td><td>Rabu</td><td>1 Juli 2026</td><td>07.30-10.00</td>
      <td>VII A</td><td>SKI</td><td>-</td>
      <td>Membuat analisis hari efektif pembelajaran</td><td>Terlaksana</td><td>1 Keg</td>
      <td></td><td></td><td></td><td></td>
    </tr>
    <!-- baris lain diisi guru -->
  </table>

  <button onclick="cetakPDF()">Cetak PDF</button>

<script>
function cetakPDF(){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF('landscape','pt','a4'); // Landscape A4

  // Tambahkan kop surat sebagai gambar
  // Pastikan kop.jpg sudah tersedia di server atau base64
  doc.addImage("kop.jpg", "JPEG", 40, 20, 750, 100); 

  // Judul
  doc.setFontSize(14);
  doc.text("JURNAL MENGAJAR DAN LAPORAN KINERJA HARIAN", 40, 140);
  doc.text("Bulan: Juli 2026", 40, 160);

  // Tabel jurnal
  doc.autoTable({ html: '#jurnalTable', startY: 180 });

  // Tanda tangan di halaman terakhir
  let finalY = doc.lastAutoTable.finalY + 50;
  doc.text("Paser, 31 Juli 2026", 600, finalY);
  doc.text("Kepala Madrasah", 100, finalY+30);
  doc.text("Guru Mata Pelajaran", 600, finalY+30);

  doc.text("Ahmad Syafi'i Badar, S.Pd.I", 100, finalY+100);
  doc.text("NIP: -", 100, finalY+115);

  doc.text("Nurlailatul Hasanah, S.Ag", 600, finalY+100);
  doc.text("NIP: 197311272005012002", 600, finalY+115);

  // Simpan PDF
  doc.save("Jurnal_LKH_Juli2026.pdf");
}
</script>
</body>
</html>
